<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3"/>
      <stop offset="100%" style="stop-color:#fef08a"/>
    </linearGradient>
    <linearGradient id="connG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="cableG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#6b7280"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="300" height="300" fill="url(#bgG)" rx="20"/>

  <!-- ─── Conector HDMI izquierdo ─── -->
  <!-- Cuerpo -->
  <polygon points="35,120 35,180 65,190 65,110" fill="url(#connG)"/>
  <!-- Cara -->
  <polygon points="35,120 35,180 52,186 52,114" fill="#d97706"/>
  <!-- Puerto -->
  <polygon points="40,130 40,170 50,174 50,126" fill="#1f2937"/>
  <!-- Pins dorados -->
  <rect x="42" y="133" width="5" height="5" rx="1" fill="#fbbf24"/>
  <rect x="42" y="143" width="5" height="5" rx="1" fill="#fbbf24"/>
  <rect x="42" y="153" width="5" height="5" rx="1" fill="#fbbf24"/>
  <rect x="42" y="163" width="5" height="5" rx="1" fill="#fbbf24"/>

  <!-- ─── Cable ─── -->
  <rect x="65" y="143" width="170" height="14" rx="7" fill="url(#cableG)"/>
  <!-- Refuerzo izquierdo -->
  <rect x="62" y="138" width="15" height="24" rx="5" fill="#4b5563"/>
  <!-- Refuerzo derecho -->
  <rect x="223" y="138" width="15" height="24" rx="5" fill="#4b5563"/>

  <!-- ─── Conector HDMI derecho ─── -->
  <polygon points="265,120 265,180 235,190 235,110" fill="url(#connG)"/>
  <polygon points="265,120 265,180 248,186 248,114" fill="#d97706"/>
  <polygon points="260,130 260,170 250,174 250,126" fill="#1f2937"/>
  <rect x="253" y="133" width="5" height="5" rx="1" fill="#fbbf24"/>
  <rect x="253" y="143" width="5" height="5" rx="1" fill="#fbbf24"/>
  <rect x="253" y="153" width="5" height="5" rx="1" fill="#fbbf24"/>
  <rect x="253" y="163" width="5" height="5" rx="1" fill="#fbbf24"/>

  <!-- Badge 4K -->
  <rect x="116" y="108" width="68" height="30" rx="8" fill="#1f2937"/>
  <text x="150" y="128" text-anchor="middle" font-size="17" font-family="Arial,sans-serif" font-weight="900" fill="#fbbf24">4K</text>

  <!-- Etiqueta -->
  <text x="150" y="225" text-anchor="middle" font-size="13" font-family="Arial,sans-serif" font-weight="bold" fill="#92400e">CABLE HDMI 2M 4K</text>
  <text x="150" y="242" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#b45309">Conectores dorados · Full HD</text>
</svg>
