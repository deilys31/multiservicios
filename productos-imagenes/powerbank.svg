<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf4ff"/>
      <stop offset="100%" style="stop-color:#f3e8ff"/>
    </linearGradient>
    <linearGradient id="bodyG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
    <linearGradient id="panelG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="300" height="300" fill="url(#bgG)" rx="20"/>

  <!-- Cuerpo del powerbank -->
  <rect x="68" y="80" width="164" height="130" rx="18" fill="url(#bodyG)"/>
  <!-- Borde brillante (highlight) -->
  <rect x="68" y="80" width="164" height="8" rx="8" fill="#8b5cf6" opacity="0.5"/>

  <!-- Panel de pantalla -->
  <rect x="82" y="96" width="136" height="60" rx="10" fill="url(#panelG)"/>

  <!-- Barra de carga (75%) -->
  <rect x="90" y="104" width="120" height="16" rx="5" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <rect x="91" y="105" width="89" height="14" rx="4" fill="#7c3aed"/>
  <rect x="91" y="105" width="89" height="7" rx="4" fill="#a78bfa" opacity="0.35"/>
  <text x="180" y="116" font-size="8" font-family="Arial,sans-serif" fill="#a78bfa" font-weight="bold">75%</text>

  <!-- Texto capacidad -->
  <text x="150" y="143" text-anchor="middle" font-size="15" font-family="Arial,sans-serif" font-weight="900" fill="#a78bfa">20000 mAh</text>

  <!-- LED indicadores -->
  <circle cx="107" cy="168" r="7" fill="#7c3aed"/>
  <circle cx="107" cy="168" r="5" fill="#4c1d95"/>
  <circle cx="107" cy="168" r="3" fill="#a78bfa"/>
  <circle cx="125" cy="168" r="7" fill="#7c3aed"/>
  <circle cx="125" cy="168" r="5" fill="#4c1d95"/>
  <circle cx="125" cy="168" r="3" fill="#a78bfa"/>
  <circle cx="143" cy="168" r="7" fill="#7c3aed"/>
  <circle cx="143" cy="168" r="5" fill="#4c1d95"/>
  <circle cx="143" cy="168" r="3" fill="#a78bfa"/>
  <circle cx="161" cy="168" r="7" fill="#374151"/>
  <circle cx="161" cy="168" r="5" fill="#1f2937"/>

  <!-- Puertos USB (salida) -->
  <rect x="82" y="196" width="30" height="14" rx="5" fill="#1f2937"/>
  <rect x="85" y="199" width="24" height="8" rx="3" fill="#374151"/>

  <rect x="120" y="196" width="30" height="14" rx="5" fill="#1f2937"/>
  <rect x="123" y="199" width="24" height="8" rx="3" fill="#374151"/>

  <!-- Puerto USB-C (entrada) -->
  <rect x="158" y="196" width="30" height="14" rx="5" fill="#1f2937"/>
  <rect x="161" y="200" width="24" height="6" rx="3" fill="#374151"/>
  <text x="173" y="221" text-anchor="middle" font-size="7" font-family="Arial,sans-serif" fill="#6d28d9">USB-C IN</text>

  <!-- Botón de encendido -->
  <rect x="195" y="196" width="28" height="14" rx="7" fill="#7c3aed"/>
  <circle cx="209" cy="203" r="4" fill="#a78bfa"/>

  <!-- Etiqueta -->
  <text x="150" y="257" text-anchor="middle" font-size="13" font-family="Arial,sans-serif" font-weight="bold" fill="#6d28d9">POWERBANK 20000mAh</text>
  <text x="150" y="273" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#8b5cf6">Carga 3 dispositivos simultáneos</text>
</svg>
