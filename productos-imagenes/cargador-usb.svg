<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eef2ff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="300" height="300" fill="url(#bgGrad)" rx="20"/>

  <!-- Clavijas del enchufe -->
  <rect x="118" y="52" width="18" height="38" rx="6" fill="#1e3a8a"/>
  <rect x="164" y="52" width="18" height="38" rx="6" fill="#1e3a8a"/>

  <!-- Cuerpo del cargador -->
  <rect x="85" y="88" width="130" height="110" rx="16" fill="url(#bodyGrad)"/>

  <!-- Pantalla / panel del cargador -->
  <rect x="100" y="102" width="100" height="75" rx="8" fill="#1d4ed8"/>

  <!-- LED indicador -->
  <circle cx="150" cy="139" r="16" fill="#60a5fa" opacity="0.9"/>
  <circle cx="150" cy="139" r="9" fill="#bfdbfe"/>
  <!-- Rayo en el LED -->
  <polygon points="152,129 146,140 151,140 148,150 155,138 150,138" fill="#1d4ed8"/>

  <!-- Puerto USB-C en la base -->
  <rect x="126" y="198" width="48" height="16" rx="8" fill="#1e40af"/>
  <rect x="131" y="201" width="38" height="10" rx="5" fill="#60a5fa" opacity="0.4"/>

  <!-- Cable -->
  <rect x="145" y="214" width="10" height="36" rx="5" fill="#374151"/>
  <!-- Conector al final del cable -->
  <rect x="133" y="248" width="34" height="14" rx="6" fill="#1f2937"/>
  <rect x="138" y="252" width="24" height="6" rx="3" fill="#374151"/>

  <!-- Etiqueta -->
  <text x="150" y="285" text-anchor="middle" font-size="13" font-family="Arial,sans-serif" font-weight="bold" fill="#3b82f6">CARGADOR USB-C 65W</text>
</svg>
